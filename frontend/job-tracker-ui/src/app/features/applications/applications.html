<div class="applications">
  <div class="applications__header">
    <h1>Applications</h1>
    <button mat-flat-button color="primary" routerLink="/applications/new">
      <mat-icon>add</mat-icon>
      New Application
    </button>
  </div>

  @if (applications().length === 0) {
    <p class="applications__empty">No applications yet. Add your first one to get started.</p>
  } @else {
    <table mat-table [dataSource]="applications()" class="applications__table">
      <ng-container matColumnDef="company">
        <th mat-header-cell *matHeaderCellDef>Company</th>
        <td mat-cell *matCellDef="let app">{{ app.company }}</td>
      </ng-container>

      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef>Position</th>
        <td mat-cell *matCellDef="let app">{{ app.position }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let app">
          <mat-chip class="status-chip status-chip--{{ app.status }}">{{ app.status }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="appliedDate">
        <th mat-header-cell *matHeaderCellDef>Applied</th>
        <td mat-cell *matCellDef="let app">{{ app.appliedDate }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        (click)="openApplication(row.applicationId)"
        class="applications__row"
      ></tr>
    </table>
  }
</div>
